name: Build Unsigned IPA (iPadOS)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Frameworks
        run: |
          chmod +x downloadFrameworks.sh
          ./downloadFrameworks.sh

      - name: List Schemes
        run: xcodebuild -list -project Code.xcodeproj

      - name: Build .app (iPadOS ARM64)
        run: |
          xcodebuild build \
            -project Code.xcodeproj \
            -scheme CodeUI \
            -configuration Release \
            -destination 'generic/platform=iPadOS' \   # 明确指定 iPadOS
            -derivedDataPath ./DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Package to IPA
        run: |
          APP_PATH=$(find ./DerivedData -name "*.app" -type d | head -n 1)
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          zip -qr CodeApp-iPad-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CodeApp-iPad-unsigned
          path: CodeApp-iPad-unsigned.ipa
