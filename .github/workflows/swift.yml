name: Build Unsigned IPA (iPadOS)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Frameworks
        run: |
          chmod +x downloadFrameworks.sh
          ./downloadFrameworks.sh

      - name: List Schemes
        run: xcodebuild -list -project Code.xcodeproj

      - name: Build .app (Fix Module Errors)
        run: xcodebuild build -project Code.xcodeproj -scheme "Code App" -configuration Debug -sdk iphoneos -arch arm64 -derivedDataPath ./DerivedData CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO ONLY_ACTIVE_ARCH=YES SWIFT_OPTIMIZATION_LEVEL="-Onone" SWIFT_TREAT_WARNINGS_AS_ERRORS=NO SWIFT_STRICT_CONCURRENCY=minimal GCC_TREAT_WARNINGS_AS_ERRORS=NO DEBUG_INFORMATION_FORMAT="dwarf"

      - name: Show full error log (if fail)
        if: failure()
        run: cat ~/Library/Logs/DiagnosticReports/*.crash || echo "No crash logs"
      
      - name: Package to IPA
        run: |
          APP_PATH=$(find ./DerivedData -name "*.app" -type d | head -n 1)
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          zip -qr CodeApp-iPad-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CodeApp-iPad-unsigned
          path: CodeApp-iPad-unsigned.ipa
